name: Deploy Images to GHCR

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/external-dns-domeneshop-webhook

jobs:
  push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine publish tag
        id: publish-tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tag="latest"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//')"
            if [[ -z "${tag}" ]]; then
              tag="manual"
            fi
          else
            tag="latest"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        shell: bash
        run: |
          docker build . --tag "${IMAGE_NAME}:${{ steps.publish-tag.outputs.tag }}"
          docker push "${IMAGE_NAME}:${{ steps.publish-tag.outputs.tag }}"